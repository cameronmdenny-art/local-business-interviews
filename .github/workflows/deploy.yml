name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Validate PHP syntax
        run: |
          find . -name "*.php" -type f ! -path "./node_modules/*" ! -path "./.git/*" -exec php -l {} \;
        
      - name: Get plugin version
        id: version
        run: |
          VERSION=$(grep "Version:" local-business-interviews.php | head -1 | sed 's/.*Version:[[:space:]]*//;s/[[:space:]]*\*\///;s/[[:space:]]*$//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        
      - name: Create release package
        run: |
          mkdir -p dist
          cd ..
          zip -r "local-business-interviews/dist/local-business-interviews-${{ steps.version.outputs.version }}.zip" \
            local-business-interviews \
            -x "local-business-interviews/.git/*" \
               "local-business-interviews/dist/*" \
               "local-business-interviews/.github/*" \
               "local-business-interviews/.gitignore" \
               "local-business-interviews/build-release.sh" \
               "local-business-interviews/.DS_Store" \
               "local-business-interviews/front-page.php.backup" \
               "local-business-interviews/*.zip"
        
      - name: Deploy Plugin to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/wp-content/plugins/local-business-interviews/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/node_modules
            **/.github
            **/dist
            **/build-release.sh
            **/.DS_Store
            **/front-page.php.backup
            **/mu-*.php
            **/mu-*.old
            **/deploy-*.sh
            **/deploy-*.py
            **/deploy-*.php
            **/*.old
            
      - name: Deploy MU-Plugins to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/wp-content/mu-plugins/
          dangerous-clean-slate: false
          exclude: |
            **/*
            !mu-cairde-header-complete.php
            !mu-local-legend-footer.php
            !mu-master-cleanup.php
