name: PHP Lint

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  php-lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          
      - name: Validate PHP syntax
        run: |
          find . -name "*.php" -type f ! -path "./node_modules/*" ! -path "./.git/*" -exec php -l {} \;
