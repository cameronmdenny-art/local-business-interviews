<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111214">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Register | Cairde Scraper</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='cairde-logo.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="sub">Your account stores your own scrape history and results.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('register') }}">
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="Optional" />

        <label>Email</label>
        <input type="email" name="email" required />

        <label>Password</label>
        <input type="password" name="password" required minlength="8" />

        <button type="submit">Create Account</button>
      </form>

      <p class="alt">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('{{ url_for('static', filename='sw.js') }}').catch(() => {});
    }
  </script>
</body>
</html>
